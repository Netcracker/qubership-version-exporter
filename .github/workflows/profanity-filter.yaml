---
name: Profanity filter

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, reopened]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      is-restricted: ${{ steps.config.outputs.is-restricted }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check if actor is restricted
        id: config
        env:
          ACTOR: ${{ github.actor }}
        run: |
          restricted=$(python3 -c "
          import yaml, os
          with open('.github/config/build-config.yaml') as f:
              config = yaml.safe_load(f)
          actors = config.get('restricted-actors', [])
          print('true' if os.environ['ACTOR'] in actors else 'false')
          ")
          echo "is-restricted=$restricted" >> "$GITHUB_OUTPUT"

  apply-filter:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Scan issue or pull request for profanity
      if: needs.prepare.outputs.is-restricted != 'true' && github.actor != 'github-actions[bot]'
      uses: IEvangelist/profanity-filter@7d6e0c79ee3d33ae09b5ed0c6e2fa04b9c512e08 # 10.0
      id: profanity-filter
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # See https://bit.ly/potty-mouth-replacement-strategies
        replacement-strategy: middle-asterisk # See Replacement strategy
        custom-profane-words-url: https://github.com/Hesham-Elbadawi/list-of-banned-words/raw/refs/heads/master/ru
